name: Build Debian package on release

on:
  push:
    paths-ignore:
      - 'docs_src/**'
      - 'README.md'
      - 'CITATION'
      - 'book.toml'
      - 'CONTRIBUTING.md'
      - '*.md'
      - 'oranda.json'
    tags: [ 'v*.*.*', 'dev*.*.*' ]


jobs:
  create_debian_pkg_with_tag:
    name: Create Debian package associated to version tag
    runs-on: ubuntu-latest
    outputs:
      deb13output: ${{ steps.deb13pkgname.outputs.deb13pkg }}
    steps:
    - name: Install s3cmd
      run: sudo apt install python3-pip -y && sudo pip3 install s3cmd awxkit
    - name: Checkout scaphandre repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get latest tag of scaphandre repository
      id: latest-scaphandre-tag
      uses: "WyriHaximus/github-action-get-previous-tag@v1.3.0"
      with:
        fallback: dev0.5.18
    - name: Checkout scaphandre-debian repository
      uses: actions/checkout@v4
      with:
        repository: hubblo-org/scaphandre-debian
    - name: Build package with version tag and Debian Trixie
      run: |
        ./build.sh -i debian:trixie-slim -v ${{ steps.latest-scaphandre-tag.outputs.tag }}
    - name: Modify name of package to include tag version for Debian Trixie
      id: deb13pkgname
      run: |
        cd target
        PKG_NAME=$(ls | sed "s/\([0-9]\+\.\)\{2\}[0-9]\+\-[0-9]\+\?/${{ steps.latest-scaphandre-tag.outputs.tag }}-deb13/")
        mv *.deb $PKG_NAME
        echo "deb13pkg=$PKG_NAME" >> "$GITHUB_OUTPUT"
    - name: Upload to scw s3
      run: |
        cd target
        s3cmd --access_key="${{ secrets.S3_ACCESS_KEY_ID }}" --secret_key="${{ secrets.S3_SECRET_ACCESS_KEY }}" --region="fr-par" --acl-public --host="s3.fr-par.scw.cloud" --host-bucket="%(bucket).s3.fr-par.scw.cloud" put ${{ steps.deb13pkgname.outputs.deb13pkg }} s3://scaphandre/x86_64/
  deb13-container-install-scaphandre:
    name: Create Debian  container and install scaphandre with URL
    needs: create_debian_pkg_with_tag
    runs-on: ubuntu-latest
    env:
      DEB13PKG: ${{ needs.create_debian_pkg_with_tag.outputs.deb13output }}
    container:
      image: debian:trixie-slim
    steps:
      - name: Install dependencies
        run: |
          apt update
          apt install -y curl
      - name: Download Debian 13 scaphandre package
        run: |
          curl -O https://s3.fr-par.scw.cloud/scaphandre/x86_64/${{ env.DEB13PKG }}
      - name: Install and show scaphandre version
        run: |
          apt install -y ./${{ env.DEB13PKG }}
          scaphandre -V
